<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ananta Green</title>
    <meta name="description" content="Green was never a trend or a movement. It was the original state of everything before we decided otherwise. Ananta engineers clean energy solutions. From the ground up.">
    
    <!-- Open Graph / Social Sharing SEO -->
    <meta property="og:title" content="Ananta Green" />
    <meta property="og:description" content="Green was never a trend or a movement. It was the original state of everything before we decided otherwise. Ananta engineers clean energy solutions." />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ananta Green" />
    <meta name="twitter:description" content="Green was never a trend or a movement. It was the original state of everything before we decided otherwise. Ananta engineers clean energy solutions." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Fontshare: Satoshi -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-overlay" style="position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;white-space:pre-wrap;padding:20px;display:none;"></div>
    <script>
      window.addEventListener('error', (event) => {
        const overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.textContent += event.message + '\n' + (event.error?.stack || '') + '\n\n';
      });
      window.addEventListener('unhandledrejection', (event) => {
        const overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.textContent += event.reason + '\n' + (event.reason?.stack || '') + '\n\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
